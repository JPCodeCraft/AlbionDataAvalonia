name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Validate release branch
        run: |
          if [[ "${{ github.ref_name }}" != "master" && "${{ github.ref_name }}" != "beta" ]]; then
            echo "Releases can only be published from master or beta."
            exit 1
          fi
        shell: bash

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Publish macOS project (x64)
        run: |
          dotnet publish ./AlbionDataAvalonia.Desktop.MacOS/AlbionDataAvalonia.Desktop.MacOS.csproj --configuration Release -r osx-x64

      - name: Publish macOS project (arm64)
        run: |
          dotnet publish ./AlbionDataAvalonia.Desktop.MacOS/AlbionDataAvalonia.Desktop.MacOS.csproj --configuration Release -r osx-arm64

      - name: Compress macOS .app bundle (x64) preserving macOS metadata
        run: |
          cd ./AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-x64/publish/
          ditto -c -k --sequesterRsrc --keepParent AFMDataClient_MacOS.app AFMDataClient_MacOS_x64.app.zip

      - name: Compress macOS .app bundle (arm64) preserving macOS metadata
        run: |
          cd ./AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-arm64/publish/
          ditto -c -k --sequesterRsrc --keepParent AFMDataClient_MacOS.app AFMDataClient_MacOS_arm64.app.zip

      - name: Upload macOS artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-x64
          path: ./AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-x64/publish/AFMDataClient_MacOS_x64.app.zip

      - name: Upload macOS artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-arm64
          path: ./AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-arm64/publish/AFMDataClient_MacOS_arm64.app.zip

  build:
    runs-on: windows-latest
    needs: build-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get the version
        id: get_version
        run: |
          $version = (Select-String -Path ./AlbionDataAvalonia.Desktop/pkg/inno.iss -Pattern '#define MyAppVersion "(.*)"').Matches.Groups[1].Value
          $project = [xml](Get-Content -Path ./AlbionDataAvalonia/AlbionDataAvalonia.csproj -Raw)
          $projectVersion = [string]$project.Project.PropertyGroup.Version
          if ($version -ne $projectVersion) {
            throw "Installer version '$version' does not match project version '$projectVersion'."
          }

          $branch = "${{ github.ref_name }}"
          if ($branch -eq "beta") {
            $channel = "beta"
            $releaseTag = "v.$version-beta"
            $releaseName = "Albion Free Market Data Client v.$version Beta"
            $isPrerelease = "true"
          }
          elseif ($branch -eq "master") {
            $channel = "stable"
            $releaseTag = "v.$version"
            $releaseName = "Albion Free Market Data Client v.$version"
            $isPrerelease = "false"
          }
          else {
            throw "Releases can only be published from master or beta. Current branch: $branch"
          }

          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RELEASE_CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RELEASE_NAME=$releaseName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "IS_PRERELEASE=$isPrerelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "Found version: $version"
          echo "Release channel: $channel"
          echo "Release tag: $releaseTag"
        shell: pwsh

      - name: Load published release manifest
        run: |
          git fetch origin master
          $manifestPath = Join-Path $env:RUNNER_TEMP "LatestVersion.json"
          git show origin/master:AlbionDataAvalonia.Desktop/LatestVersion.json | Out-File -FilePath $manifestPath -Encoding utf8
          echo "MANIFEST_PATH=$manifestPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Validate release version
        run: |
          $version = "${{ env.VERSION }}"
          $channel = "${{ env.RELEASE_CHANNEL }}"
          $path = "${{ env.MANIFEST_PATH }}"

          $newVersion = $null
          if (-not [version]::TryParse($version, [ref]$newVersion)) {
            throw "Release version '$version' is not a valid numeric version."
          }

          if (-not (Test-Path $path)) {
            throw "Published release manifest was not found at '$path'."
          }

          $current = Get-Content -Path $path -Raw | ConvertFrom-Json
          $stableVersion = $null
          $betaVersion = $null

          if ($current.PSObject.Properties.Name -contains "stable" -and $current.stable -and $current.stable.version) {
            $stableVersion = [version]$current.stable.version
          }
          elseif ($current.PSObject.Properties.Name -contains "version" -and $current.version) {
            $stableVersion = [version]$current.version
          }

          if ($current.PSObject.Properties.Name -contains "beta" -and $current.beta -and $current.beta.version) {
            $betaVersion = [version]$current.beta.version
          }

          if ($channel -eq "stable") {
            if ($stableVersion -ne $null -and $newVersion -le $stableVersion) {
              throw "Cannot publish stable version $newVersion because it is not higher than stable version $stableVersion."
            }
          }
          else {
            if ($stableVersion -ne $null -and $newVersion -le $stableVersion) {
              throw "Cannot publish beta version $newVersion because it is not higher than stable version $stableVersion."
            }
            if ($betaVersion -ne $null -and $newVersion -le $betaVersion) {
              throw "Cannot publish beta version $newVersion because it is not higher than beta version $betaVersion."
            }
          }

          echo "Release version $newVersion is valid for the $channel channel."
        shell: pwsh

      - name: Get diff
        id: get_diff
        run: |
          git fetch --tags
          if [ "${{ env.RELEASE_CHANNEL }}" = "beta" ]; then
            LATEST_TAG=$(git tag --merged HEAD --list "v.*-beta" --sort=-version:refname | head -n 1)
          else
            LATEST_TAG=$(git tag --merged HEAD --list "v.*" --sort=-version:refname | grep -v -- "-beta$" | head -n 1)
          fi
          CURRENT_COMMIT=$(git rev-parse HEAD)
          REPO_URL="https://github.com/JPCodeCraft/AlbionDataAvalonia"

          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found. Using all commits for the log."
            # Get all commits or limit to a reasonable number
            COMMIT_LOG=$(git log --max-count=20 --pretty=format:"[%h]($REPO_URL/commit/%H) - %s")
          else
            echo "Found tag: $LATEST_TAG"
            COMMIT_LOG=$(git log --pretty=format:"[%h]($REPO_URL/commit/%H) - %s" $LATEST_TAG..$CURRENT_COMMIT)
            if [ -z "$COMMIT_LOG" ]; then
              COMMIT_LOG="No new commits since the last release."
            fi
          fi

          COMMIT_LOG=${COMMIT_LOG//$'\n'/<br>}
          echo "Latest Tag: ${LATEST_TAG:-None}"
          echo "Current Commit: $CURRENT_COMMIT"
          echo "Commit Log: $COMMIT_LOG"
          echo "COMMIT_LOG=$COMMIT_LOG" >> $GITHUB_ENV
        shell: bash

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Install zip
        run: choco install zip -y
        shell: pwsh

      - name: Publish projects (Windows and Linux)
        run: |
          dotnet publish ./AlbionDataAvalonia.Desktop/AlbionDataAvalonia.Desktop.csproj --configuration Release
          dotnet publish ./AlbionDataAvalonia.Desktop.Linux/AlbionDataAvalonia.Desktop.Linux.csproj --configuration Release

      - name: Download macOS artifact (x64)
        uses: actions/download-artifact@v4
        with:
          name: macos-app-x64
          path: AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-x64/publish

      - name: Download macOS artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: macos-app-arm64
          path: AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-arm64/publish

      - name: Compile .ISS to .EXE Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: AlbionDataAvalonia.Desktop/pkg/inno.iss
          options: /O+

      - name: Create Tag
        id: create_tag
        run: |
          git tag ${{ env.RELEASE_TAG }}
          git push origin ${{ env.RELEASE_TAG }}
        shell: pwsh

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.AVALONIA_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: ${{ env.RELEASE_NAME }}
          body: |
            Changes since last release:
            ${{ env.COMMIT_LOG }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}

      - name: Upload Release Asset (Windows Installer)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.AVALONIA_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: C:/Users/runneradmin/Documents/Inno Setup Output/AFMDataClientSetup_v_${{ env.VERSION }}.exe
          asset_name: AFMDataClientSetup_v_${{ env.VERSION }}.exe
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (Linux Binary)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.AVALONIA_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./AlbionDataAvalonia.Desktop.Linux/bin/Release/net10.0/linux-x64/publish/AFMDataClient_Linux64
          asset_name: AFMDataClient_Linux64
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (Linux Installer)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.AVALONIA_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./AlbionDataAvalonia.Desktop.Linux/bin/Release/net10.0/linux-x64/publish/AFMDataClient_Linux64_Installer.sh
          asset_name: AFMDataClient_Linux64_Installer.sh
          asset_content_type: application/x-sh

      - name: Upload Release Asset (Linux Uninstaller)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.AVALONIA_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./AlbionDataAvalonia.Desktop.Linux/bin/Release/net10.0/linux-x64/publish/AFMDataClient_Linux64_Uninstaller.sh
          asset_name: AFMDataClient_Linux64_Uninstaller.sh
          asset_content_type: application/x-sh

      - name: Upload Release Asset (macOS .app Bundle x64)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.AVALONIA_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-x64/publish/AFMDataClient_MacOS_x64.app.zip
          asset_name: AFMDataClient_MacOS_x64.app.zip
          asset_content_type: application/zip

      - name: Upload Release Asset (macOS .app Bundle arm64)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.AVALONIA_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./AlbionDataAvalonia.Desktop.MacOS/bin/Release/net10.0/osx-arm64/publish/AFMDataClient_MacOS_arm64.app.zip
          asset_name: AFMDataClient_MacOS_arm64.app.zip
          asset_content_type: application/zip

      - name: Checkout release metadata
        uses: actions/checkout@v4
        with:
          ref: master
          path: release-metadata
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create LatestVersion.json
        run: |
          $version = "${{ env.VERSION }}"
          $channel = "${{ env.RELEASE_CHANNEL }}"
          $tag = "${{ env.RELEASE_TAG }}"
          $repoUrl = "https://github.com/JPCodeCraft/AlbionDataAvalonia"
          $path = "./release-metadata/AlbionDataAvalonia.Desktop/LatestVersion.json"

          function New-ReleaseEntry {
            param(
              [string]$EntryVersion,
              [string]$EntryTag
            )

            return [ordered]@{
              version = $EntryVersion
              windowsDownloadUrl = "$repoUrl/releases/download/$EntryTag/AFMDataClientSetup_v_$EntryVersion.exe"
              releasePageUrl = "$repoUrl/releases/tag/$EntryTag"
            }
          }

          $current = $null
          if (Test-Path $path) {
            $current = Get-Content -Path $path -Raw | ConvertFrom-Json
          }

          $stable = $null
          $beta = $null

          if ($current -ne $null) {
            if ($current.PSObject.Properties.Name -contains "stable" -and $current.stable -and $current.stable.version) {
              $stable = $current.stable
            }
            elseif ($current.PSObject.Properties.Name -contains "version" -and $current.version) {
              $stable = New-ReleaseEntry -EntryVersion $current.version -EntryTag "v.$($current.version)"
            }

            if ($current.PSObject.Properties.Name -contains "beta" -and $current.beta -and $current.beta.version) {
              $beta = $current.beta
            }
          }

          if ($channel -eq "beta") {
            if ($stable -eq $null -or [string]::IsNullOrWhiteSpace($stable.version)) {
              throw "Cannot create a beta manifest without an existing stable version."
            }

            $beta = New-ReleaseEntry -EntryVersion $version -EntryTag $tag
          }
          else {
            $stable = New-ReleaseEntry -EntryVersion $version -EntryTag $tag

            if ($beta -ne $null -and [version]$beta.version -le [version]$version) {
              $beta = $null
            }
          }

          $manifest = [ordered]@{
            version = $stable.version
            stable = $stable
          }

          if ($beta -ne $null) {
            $manifest["beta"] = $beta
          }

          $manifest | ConvertTo-Json -Depth 4 | Out-File -FilePath $path -Encoding utf8
        shell: pwsh

      - name: Commit and push changes
        run: |
          Set-Location ./release-metadata
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./AlbionDataAvalonia.Desktop/LatestVersion.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            echo "LatestVersion.json is already current."
            exit 0
          }
          git commit -m "Update LatestVersion.json"
          git push origin HEAD:master
        shell: pwsh
